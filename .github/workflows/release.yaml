name: release

# Cut a release by pushing a version tag AFTER the on-hardware release gate is green
# (accuracy parity, no OOM, no perf or UX regression, and a clean install; see
# RELEASING.md):
#   git tag vX.Y.Z && git push origin master vX.Y.Z
# This builds the artifacts and publishes a GitHub Release with notes + wheel. No PyPI
# job: GitHub Releases are the project distribution policy. The wheel still needs ttnn;
# UMA specifically needs the validated source build (see RELEASING.md).

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Tag must match pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -m1 -E '^version *=' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag != pyproject version $ver"; exit 1
          fi
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - name: Create or refresh GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '/^## /{p=($0 ~ "\\["v"\\]")} p' CHANGELOG.md > NOTES.md || true
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists (e.g. tag re-push); refreshing assets."
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          elif [ -s NOTES.md ]; then
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file NOTES.md
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
          fi

  # TT-Atom is distributed through GitHub Releases, not PyPI. UMA requires a source
  # tt-metal/ttnn build with its custom rotation op; see README.md and RELEASING.md.
